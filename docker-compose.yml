services:
  backend:
    build:
      context: ./backend
    container_name: apiarena-backend
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - apiarena

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL: ""
    container_name: apiarena-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - apiarena

  nginx:
    image: nginx:alpine
    container_name: apiarena-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - apiarena

networks:
  apiarena:
    driver: bridge
