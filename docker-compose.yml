services:
  backend:
    build:
      context: ./backend
    container_name: apiarena-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://YOUR_SERVER_IP:8000"
        NEXT_PUBLIC_WS_URL: "ws://YOUR_SERVER_IP:8000"
    container_name: apiarena-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend
